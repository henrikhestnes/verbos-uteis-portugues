<style>
  :root {
    --bg: #fafaf9;
    --card: #ffffff;
    --border: #e7e5e4;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --text: #1c1917;
    --muted: #78716c;
    --hidden-bg: #f5f0eb;
    --hidden-border: #d6cfc7;
    --cat-daily: #3b82f6;
    --cat-comm: #8b5cf6;
    --cat-consume: #10b981;
    --cat-routine: #f59e0b;
    --cat-social: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 1rem;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 2rem 0 1.5rem;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .controls button {
    padding: 0.5rem 1.1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .controls button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .controls button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .category {
    margin-bottom: 1.75rem;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    padding: 0 0.25rem;
  }

  .category-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .category-header h2 {
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .verb-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .verb-row {
    display: grid;
    grid-template-columns: 2.2rem 1.75rem 1fr 1.75rem;
    align-items: center;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    transition: box-shadow 0.15s ease;
  }

  .verb-text {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 0.5rem;
    min-width: 0;
  }

  .speak-btn, .conj-btn {
    width: 1.75rem;
    height: 1.75rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 50%;
    padding: 0;
    transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .speak-btn:hover, .conj-btn:hover {
    background: var(--hidden-bg);
    color: var(--accent);
  }

  .speak-btn:active, .conj-btn:active {
    transform: scale(0.9);
  }

  .speak-btn.playing {
    color: var(--accent);
    background: var(--hidden-bg);
  }

  .speak-btn svg, .conj-btn svg {
    width: 1.05rem;
    height: 1.05rem;
  }

  .conj-btn svg {
    transition: transform 0.2s ease;
  }

  .verb-row.expanded .conj-btn {
    color: var(--accent);
  }

  .verb-row.expanded .conj-btn svg {
    transform: rotate(180deg);
  }

  .conjugation-panel {
    grid-column: 1 / -1;
    display: none;
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px dashed var(--border);
  }

  .verb-row.expanded .conjugation-panel {
    display: block;
  }

  .conj-body {
    display: grid;
    gap: 0.9rem 1.25rem;
  }

  @media (min-width: 620px) {
    .conj-body {
      grid-template-columns: 1fr 1fr 1fr;
    }
  }

  .conj-tense {
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 0.6rem;
    row-gap: 0.4rem;
    align-items: baseline;
  }

  .conj-title {
    grid-column: 1 / -1;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }

  .conj-pron {
    color: var(--muted);
    font-size: 0.8rem;
    white-space: nowrap;
  }

  .conj-forms {
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    min-width: 0;
  }

  .conj-form {
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
    transition: background 0.15s ease, color 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    align-self: flex-start;
  }

  .conj-form:hover {
    background: var(--hidden-bg);
    color: var(--accent);
  }

  .conj-en {
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
    padding: 0 0.35rem;
    line-height: 1.25;
  }

  .conjugation-panel .note-unknown {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
  }

  .shuffled .verb-row {
    border-left: 4px solid var(--row-color, var(--border));
  }

  .verb-row:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .verb-num {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-align: right;
  }

  .verb-pt, .verb-en {
    font-size: 1rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    padding: 0.3rem 0.4rem;
    border-radius: 4px;
    transition: background 0.15s ease;
    touch-action: manipulation;
  }

  .verb-pt { font-weight: 600; }
  .verb-en { color: #555; }

  .verb-pt .note, .verb-en .note {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 400;
  }

  .verb-pt.hidden, .verb-en.hidden {
    background: var(--hidden-bg);
    border: 1px dashed var(--hidden-border);
    color: transparent;
    min-height: 1.6rem;
  }

  .verb-pt.hidden *, .verb-en.hidden * {
    color: transparent;
  }

  .verb-pt.hidden::after, .verb-en.hidden::after {
    content: 'tap to reveal';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
    font-weight: 400;
  }

  footer {
    text-align: center;
    padding: 2rem 0 1rem;
    color: var(--muted);
    font-size: 0.8rem;
  }

  @media (max-width: 500px) {
    .verb-row {
      grid-template-columns: 1.75rem 1.75rem 1fr 1.5rem;
      padding: 0.6rem;
      gap: 0.3rem 0.4rem;
    }
    .verb-text {
      grid-template-columns: 1fr;
      gap: 0.1rem;
    }
    .verb-en {
      font-size: 0.85rem;
      padding-top: 0;
    }
    .verb-pt, .verb-en { font-size: 0.9rem; }
    .controls button { font-size: 0.85rem; padding: 0.5rem 0.9rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Verbos Úteis</h1>
    <p>Portuguese &harr; English &mdash; click any word to hide/reveal</p>
  </header>

  <div class="controls">
    <button onclick="hideAll('pt')" id="btn-hide-pt">Hide all Português</button>

    <button onclick="resetOrder()" id="btn-reset">Original order</button>
  </div>

  <div id="content"></div>

  <footer>Verbos mais úteis &mdash; study tool</footer>
</div>

    imperfeito: ["sentia", "sentia", "sentíamos", "sentiam"]
  },
  perder: {
    presente: ["perco", "perde", "perdemos", "perdem"],
    perfeito: ["perdi", "perdeu", "perdemos", "perderam"],
    imperfeito: ["perdia", "perdia", "perdíamos", "perdiam"]
  },
  rir: {
    presente: ["rio", "ri", "rimos", "riem"],
    perfeito: ["ri", "riu", "rimos", "riram"],
    imperfeito: ["ria", "ria", "ríamos", "riam"]
  },
  sorrir: {
    presente: ["sorrio", "sorri", "sorrimos", "sorriem"],
    perfeito: ["sorri", "sorriu", "sorrimos", "sorriram"],
    imperfeito: ["sorria", "sorria", "sorríamos", "sorriam"]
  },
  seguir: {
    presente: ["sigo", "segue", "seguimos", "seguem"],
    perfeito: ["segui", "seguiu", "seguimos", "seguiram"],
    imperfeito: ["seguia", "seguia", "seguíamos", "seguiam"]
  }
};

function conjugateRegular(verb) {
  const ending = verb.slice(-2);
  const stem = verb.slice(0, -2);
  const last = stem.slice(-1);
  const stemBase = stem.slice(0, -1);

  if (ending === "ar") {
    let perfStem1 = stem;
    if (last === "c") perfStem1 = stemBase + "qu";
    else if (last === "g") perfStem1 = stemBase + "gu";
    else if (last === "ç") perfStem1 = stemBase + "c";
    return {
      presente: [stem + "o", stem + "a", stem + "amos", stem + "am"],
      perfeito: [perfStem1 + "ei", stem + "ou", stem + "amos", stem + "aram"],
      imperfeito: [stem + "ava", stem + "ava", stem + "ávamos", stem + "avam"]
    };
  }

  if (ending === "er") {
    let presStem1 = stem;
    if (last === "c") presStem1 = stemBase + "ç";
    else if (last === "g") presStem1 = stemBase + "j";
    return {
      presente: [presStem1 + "o", stem + "e", stem + "emos", stem + "em"],
      perfeito: [stem + "i", stem + "eu", stem + "emos", stem + "eram"],
      imperfeito: [stem + "ia", stem + "ia", stem + "íamos", stem + "iam"]
    };
  }

  if (ending === "ir") {
    let presStem1 = stem;
    if (last === "g") presStem1 = stemBase + "j";
    return {
      presente: [presStem1 + "o", stem + "e", stem + "imos", stem + "em"],
      perfeito: [stem + "i", stem + "iu", stem + "imos", stem + "iram"],
      imperfeito: [stem + "ia", stem + "ia", stem + "íamos", stem + "iam"]
    };
  }

  return null;
}

function conjugate(verb) {
  if (IRREGULAR[verb]) return IRREGULAR[verb];
  return conjugateRegular(verb);
}

const EN_PRONOUNS = ["I", "he / she", "we", "they"];

const IRREGULAR_EN_PAST = {
  "have": "had", "go": "went", "come": "came", "do": "did", "give": "gave",
  "see": "saw", "say": "said", "think": "thought", "take": "took", "put": "put",
  "leave": "left", "meet": "met", "tell": "told", "read": "read", "write": "wrote",
  "hear": "heard", "understand": "understood", "drive": "drove", "sleep": "slept",
  "wake": "woke", "bring": "brought", "run": "ran", "fall": "fell", "feel": "felt",
  "win": "won", "lose": "lost", "sell": "sold", "choose": "chose", "know": "knew",
  "forget": "forgot", "speak": "spoke", "pay": "paid", "eat": "ate", "drink": "drank",
  "buy": "bought", "stop": "stopped", "chat": "chatted", "can": "could", "must": "had to"
};

const IRREGULAR_EN_3SG = {
  "be": "is", "have": "has", "do": "does", "go": "goes",
  "can": "can", "must": "must", "should": "should"
};

const NON_INFLECTING_EN = new Set(["can", "must", "should"]);

function extractPrimaryEn(enText) {
  let s = enText.trim();
  if (s.startsWith("to ")) s = s.slice(3);
  const cuts = [",", "/", "("].map(c => s.indexOf(c)).filter(i => i >= 0);
  if (cuts.length) s = s.slice(0, Math.min(...cuts));
  return s.trim();
}

function splitEnPhrase(phrase) {
  const parts = phrase.split(/\s+/);
  return { head: parts[0], rest: parts.slice(1).join(" ") };
}

function regularPastEn(v) {
  if (v.endsWith("e")) return v + "d";
  if (/[^aeiou]y$/.test(v)) return v.slice(0, -1) + "ied";
  return v + "ed";
}

function regular3sgEn(v) {
  if (/[^aeiou]y$/.test(v)) return v.slice(0, -1) + "ies";
  if (/(s|x|z|o)$/.test(v) || /(ch|sh)$/.test(v)) return v + "es";
  return v + "s";
}

function joinHead(head, rest) {
  return rest ? head + " " + rest : head;
}

function enPresent(phrase, personIdx) {
  const { head, rest } = splitEnPhrase(phrase);
  if (head === "be") {
    const form = personIdx === 0 ? "am" : personIdx === 1 ? "is" : "are";
    return joinHead(form, rest);
  }
  if (personIdx === 1) {
    const form = IRREGULAR_EN_3SG[head] !== undefined ? IRREGULAR_EN_3SG[head] : regular3sgEn(head);
    return joinHead(form, rest);
  }
  return joinHead(head, rest);
}

function enPast(phrase, personIdx) {
  const { head, rest } = splitEnPhrase(phrase);
  if (head === "be") {
    const form = (personIdx === 2 || personIdx === 3) ? "were" : "was";
    return joinHead(form, rest);
  }
  const form = IRREGULAR_EN_PAST[head] !== undefined ? IRREGULAR_EN_PAST[head] : regularPastEn(head);
  return joinHead(form, rest);
}

function enImperfect(phrase, personIdx) {
  const { head, rest } = splitEnPhrase(phrase);
  if (head === "be") {
    return joinHead("used to be", rest);
  }
  if (NON_INFLECTING_EN.has(head)) {
    const form = IRREGULAR_EN_PAST[head] || head;
    return joinHead(form, rest);
  }
  return joinHead("used to " + head, rest);
}

function conjugateEn(ptVerb, enText) {
  const override = IRREGULAR[ptVerb] && IRREGULAR[ptVerb].en;
  if (override) return override;

  const phrase = extractPrimaryEn(enText);
  if (!phrase) return null;

  const build = fn => EN_PRONOUNS.map((p, i) => `${p} ${fn(phrase, i)}`);
  return {
    presente: build(enPresent),
    perfeito: build(enPast),
    imperfeito: build(enImperfect)
  };
}

function buildConjugationPanel(verb, enText) {
  const c = conjugate(verb);
  const ce = conjugateEn(verb, enText);
  const panel = document.createElement("div");
  panel.className = "conjugation-panel";

  if (!c) {
    panel.innerHTML = '<span class="note-unknown">Conjugação não disponível.</span>';
    return panel;
  }

  const body = document.createElement("div");
  body.className = "conj-body";

  TENSES.forEach(t => {
    const block = document.createElement("div");
    block.className = "conj-tense";

    const title = document.createElement("div");
    title.className = "conj-title";
    title.textContent = t.label;
    block.appendChild(title);

    c[t.key].forEach((form, i) => {
      const pron = document.createElement("span");
      pron.className = "conj-pron";
      pron.textContent = PRONOUNS[i];
      block.appendChild(pron);

      const forms = document.createElement("span");
      forms.className = "conj-forms";

      const formEl = document.createElement("span");
      formEl.className = "conj-form";
      formEl.textContent = form;
      formEl.title = `Ouvir "${form}"`;
      formEl.addEventListener("click", (e) => {
        e.stopPropagation();
        speak(form, null);
      });
      forms.appendChild(formEl);

      if (ce && ce[t.key] && ce[t.key][i]) {
        const enEl = document.createElement("span");
        enEl.className = "conj-en";
        enEl.textContent = ce[t.key][i];
        forms.appendChild(enEl);
      }

      block.appendChild(forms);
    });

    body.appendChild(block);
  });

  panel.appendChild(body);
  return panel;
}

let ptVoice = null;
function loadVoices() {
  const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  const isPt = v => v.lang && v.lang.toLowerCase().startsWith("pt");
  ptVoice = voices.find(v => isPt(v) && /luciana/i.test(v.name))
         || voices.find(v => v.lang === "pt-BR" && /google|natural|premium|enhanced/i.test(v.name))
         || voices.find(v => v.lang === "pt-BR")
         || voices.find(isPt)
         || null;
}
if (typeof window !== "undefined" && window.speechSynthesis) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, btn) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  document.querySelectorAll(".speak-btn.playing").forEach(b => b.classList.remove("playing"));

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "pt-BR";
  utterance.rate = 0.9;
  if (ptVoice) utterance.voice = ptVoice;

  if (btn) {
    btn.classList.add("playing");
    utterance.onend = () => btn.classList.remove("playing");
    utterance.onerror = () => btn.classList.remove("playing");
  }

  speechSynthesis.speak(utterance);
}

function buildRow(num, pt, en, note, color) {
  const row = document.createElement("div");
  row.className = "verb-row";
  if (color) row.style.setProperty("--row-color", color);

  const numEl = document.createElement("span");
  numEl.className = "verb-num";
  numEl.textContent = num + ".";

  const speakBtn = document.createElement("button");
  speakBtn.className = "speak-btn";
  speakBtn.type = "button";
  speakBtn.setAttribute("aria-label", `Ouvir pronúncia de ${pt}`);
  speakBtn.title = `Ouvir "${pt}"`;
  speakBtn.innerHTML = SPEAKER_SVG;
  speakBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    speak(pt, speakBtn);
  });

  const textWrap = document.createElement("div");
  textWrap.className = "verb-text";

  const ptEl = document.createElement("span");
  ptEl.className = "verb-pt";
  ptEl.dataset.lang = "pt";
  ptEl.innerHTML = pt + (note ? ` <span class="note">(${note})</span>` : "");
  ptEl.addEventListener("click", () => ptEl.classList.toggle("hidden"));

  const enEl = document.createElement("span");
  enEl.className = "verb-en";
  enEl.dataset.lang = "en";
  enEl.textContent = en;
  enEl.addEventListener("click", () => enEl.classList.toggle("hidden"));

  textWrap.appendChild(ptEl);
  textWrap.appendChild(enEl);

  const conjBtn = document.createElement("button");
  conjBtn.className = "conj-btn";
  conjBtn.type = "button";
  conjBtn.setAttribute("aria-label", `Conjugações de ${pt}`);
  conjBtn.title = "Mostrar conjugações";
  conjBtn.innerHTML = CHEVRON_SVG;
  conjBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    row.classList.toggle("expanded");
  });

  const panel = buildConjugationPanel(pt, en);

  row.appendChild(numEl);
  row.appendChild(speakBtn);
  row.appendChild(textWrap);
  row.appendChild(conjBtn);
  row.appendChild(panel);
  return row;
}

function render() {
  const root = document.getElementById("content");
  root.innerHTML = "";
  root.classList.remove("shuffled");

  DATA.forEach(cat => {
    const section = document.createElement("div");
    section.className = "category";

    const hdr = document.createElement("div");
    hdr.className = "category-header";
    hdr.innerHTML = `<span class="category-dot" style="background:${cat.color}"></span><h2>${cat.category}</h2>`;
    section.appendChild(hdr);

    const list = document.createElement("div");
    list.className = "verb-list";

    cat.verbs.forEach(v => {
      const [num, pt, en, note] = v;
      list.appendChild(buildRow(num, pt, en, note, cat.color));
    });

    section.appendChild(list);
    root.appendChild(section);
  });

  updateOrderButtons(false);
}

function renderShuffled() {
  const all = [];
  DATA.forEach(cat => {
    cat.verbs.forEach(v => {
      const [num, pt, en, note] = v;
      all.push({ num, pt, en, note, color: cat.color });
    });
  });

  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }

  const root = document.getElementById("content");
  root.innerHTML = "";
  root.classList.add("shuffled");

  const list = document.createElement("div");
  list.className = "verb-list";
  all.forEach(v => {
    list.appendChild(buildRow(v.num, v.pt, v.en, v.note, v.color));
  });
  root.appendChild(list);

  updateOrderButtons(true);
}

function shuffleVerbs() {
  renderShuffled();
}

function resetOrder() {
  render();
}

function updateOrderButtons(isShuffled) {
  document.getElementById("btn-shuffle").classList.toggle("active", isShuffled);
  document.getElementById("btn-reset").classList.toggle("active", !isShuffled);
}

function hideAll(lang) {
  document.querySelectorAll(`[data-lang="${lang}"]`).forEach(el => el.classList.add("hidden"));
  updateButtons(lang);
}

function showAll() {
  document.querySelectorAll(".hidden").forEach(el => el.classList.remove("hidden"));
  updateButtons(null);
}

function updateButtons(hiddenLang) {
  document.getElementById("btn-hide-pt").classList.toggle("active", hiddenLang === "pt");
  document.getElementById("btn-hide-en").classList.toggle("active", hiddenLang === "en");
  document.getElementById("btn-show").classList.toggle("active", hiddenLang === null);
}

render();
</script>
