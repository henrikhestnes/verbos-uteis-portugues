<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbos Úteis — Português / English</title>
<style>
  :root {
    --bg: #fafaf9;
    --card: #ffffff;
    --border: #e7e5e4;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --text: #1c1917;
    --muted: #78716c;
    --hidden-bg: #f5f0eb;
    --hidden-border: #d6cfc7;
    --cat-daily: #3b82f6;
    --cat-comm: #8b5cf6;
    --cat-consume: #10b981;
    --cat-routine: #f59e0b;
    --cat-social: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 1rem;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 2rem 0 1.5rem;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .controls button {
    padding: 0.5rem 1.1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .controls button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .controls button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .category {
    margin-bottom: 1.75rem;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    padding: 0 0.25rem;
  }

  .category-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .category-header h2 {
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .verb-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .verb-row {
    display: grid;
    grid-template-columns: 2.2rem 1.75rem 1fr 1fr;
    align-items: center;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    transition: box-shadow 0.15s ease;
  }

  .speak-btn {
    width: 1.75rem;
    height: 1.75rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 50%;
    padding: 0;
    transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .speak-btn:hover {
    background: var(--hidden-bg);
    color: var(--accent);
  }

  .speak-btn:active {
    transform: scale(0.9);
  }

  .speak-btn.playing {
    color: var(--accent);
    background: var(--hidden-bg);
  }

  .speak-btn svg {
    width: 1.05rem;
    height: 1.05rem;
  }

  .shuffled .verb-row {
    border-left: 4px solid var(--row-color, var(--border));
  }

  .verb-row:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .verb-num {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-align: right;
  }

  .verb-pt, .verb-en {
    font-size: 1rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    padding: 0.3rem 0.4rem;
    border-radius: 4px;
    transition: background 0.15s ease;
    touch-action: manipulation;
  }

  .verb-pt { font-weight: 600; }
  .verb-en { color: #555; }

  .verb-pt .note, .verb-en .note {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 400;
  }

  .verb-pt.hidden, .verb-en.hidden {
    background: var(--hidden-bg);
    border: 1px dashed var(--hidden-border);
    color: transparent;
    min-height: 1.6rem;
  }

  .verb-pt.hidden *, .verb-en.hidden * {
    color: transparent;
  }

  .verb-pt.hidden::after, .verb-en.hidden::after {
    content: 'tap to reveal';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
    font-weight: 400;
  }

  footer {
    text-align: center;
    padding: 2rem 0 1rem;
    color: var(--muted);
    font-size: 0.8rem;
  }

  @media (max-width: 500px) {
    .verb-row {
      grid-template-columns: 1.75rem 1.75rem 1fr;
      padding: 0.6rem;
      gap: 0.2rem 0.4rem;
    }
    .verb-en {
      grid-column: 3;
      font-size: 0.85rem;
      padding-top: 0;
    }
    .verb-pt, .verb-en { font-size: 0.9rem; }
    .controls button { font-size: 0.85rem; padding: 0.5rem 0.9rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Verbos Úteis</h1>
    <p>Portuguese &harr; English &mdash; click any word to hide/reveal</p>
  </header>

  <div class="controls">
    <button onclick="hideAll('pt')" id="btn-hide-pt">Hide all Português</button>
    <button onclick="hideAll('en')" id="btn-hide-en">Hide all English</button>
    <button onclick="showAll()" id="btn-show">Show all</button>
  </div>

  <div class="controls">
    <button onclick="shuffleVerbs()" id="btn-shuffle">Shuffle</button>
    <button onclick="resetOrder()" id="btn-reset">Original order</button>
  </div>

  <div id="content"></div>

  <footer>Verbos mais úteis &mdash; study tool</footer>
</div>

<script>
const DATA = [
  {

      [5, "ir", "to go", "irregular"],
      [6, "vir", "to come", "irregular"],
      [7, "fazer", "to do, to make", "irregular"],

      [9, "ver", "to see", "irregular"],
      [10, "ficar", "to stay, to become"]
    ]
  },
  {

    color: "#0ea5e9",
    verbs: [

      [12, "querer", "to want", "irregular"],
      [13, "precisar", "to need"],
      [14, "dever", "must, should"],

    ]
  },
  {

    color: "#3b82f6",
    verbs: [
      [21, "morar", "to live (reside)"],
      [22, "trabalhar", "to work"],
      [23, "estudar", "to study"],
      [24, "chegar", "to arrive"],
      [25, "sair", "to go out", "irregular"],
      [26, "entrar", "to enter, to get in, to come in"],
      [27, "pegar", "to take (bus, metro, Uber)"],
      [28, "levar", "to take / carry"],
      [29, "voltar", "to return"],
      [30, "caminhar", "to walk"],
      [31, "dirigir", "to drive"],
      [32, "ligar", "to call (phone), to turn on"]
    ]
  },
  {
    category: "Comunicação",
    color: "#8b5cf6",
    verbs: [
      [33, "falar", "to speak, to talk"],
      [34, "dizer", "to say", "irregular"],
      [35, "perguntar", "to ask"],
      [36, "responder", "to answer"],
      [37, "explicar", "to explain"],
      [38, "chamar", "to call"],
      [39, "conversar", "to chat"],
      [40, "contar", "to tell"],

      [43, "aprender", "to learn"]
    ]
  },
  {
    category: "Consumo e serviços",
    color: "#10b981",
    verbs: [
      [44, "comprar", "to buy"],
      [45, "pagar", "to pay"],
      [46, "usar", "to use"],
      [47, "pedir", "to order / request", "irregular"],
      [48, "abrir", "to open"],
      [49, "fechar", "to close"],

      [51, "trocar", "to exchange"],

    ]
  },
  {

    color: "#f59e0b",
    verbs: [
      [54, "comer", "to eat"],
      [55, "beber", "to drink"],
      [56, "cozinhar", "to cook"],
      [57, "assistir", "to watch"],
      [58, "escutar", "to listen"],
      [59, "dançar", "to dance"],
      [60, "viajar", "to travel"],
      [61, "descansar", "to rest"],

      [63, "treinar", "to train"]
    ]
  },
  {
    category: "Ações do dia a dia",
    color: "#f97316",
    verbs: [
      [64, "acordar", "to wake up"],
      [65, "dormir", "to sleep", "irregular"],
      [66, "ler", "to read", "irregular"],
      [67, "escrever", "to write"],
      [68, "ouvir", "to hear", "irregular"],
      [69, "começar", "to start, to begin"],
      [70, "terminar", "to finish"],
      [71, "tentar", "to try"],

      [73, "mostrar", "to show"]
    ]
  },
  {
    category: "Ações e movimentos",
    color: "#14b8a6",
    verbs: [
      [74, "trazer", "to bring", "irregular"],
      [75, "colocar", "to put, to place"],
      [76, "tirar", "to take off, to remove"],
      [77, "deixar", "to leave (behind), to let"],
      [78, "passar", "to pass, to spend (time)"],
      [79, "parar", "to stop"],

      [81, "mudar", "to change, to move (house)"],

    ]
  },
  {
    category: "Sentimentos e percepção",
    color: "#a855f7",
    verbs: [
      [84, "sentir", "to feel", "irregular"],
      [85, "acreditar", "to believe"],
      [86, "parecer", "to seem, to look like"],
      [87, "ganhar", "to win, to earn"],
      [88, "perder", "to lose", "irregular"],
      [89, "rir", "to laugh", "irregular"],
      [90, "sorrir", "to smile", "irregular"],
      [91, "chorar", "to cry"],
      [92, "sonhar", "to dream"],
      [93, "viver", "to live (to be alive)"]
    ]
  },
  {
    category: "Interação social",
    color: "#ef4444",
    verbs: [
      [94, "gostar", "to like"],
      [95, "amar", "to love"],
      [96, "ajudar", "to help"],
      [97, "convidar", "to invite"],
      [98, "aceitar", "to accept"],
      [99, "recusar", "to refuse"],
      [100, "combinar", "to arrange"],
      [101, "encontrar", "to meet"],
      [102, "esperar", "to wait, to hope"],
      [103, "seguir", "to follow", "irregular"],
      [104, "agradecer", "to thank"],
      [105, "desculpar", "to apologize, to excuse"]
    ]
  }
];

const SPEAKER_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';

let ptVoice = null;
function loadVoices() {
  const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  const isPt = v => v.lang && v.lang.toLowerCase().startsWith("pt");
  ptVoice = voices.find(v => isPt(v) && /luciana/i.test(v.name))
         || voices.find(v => v.lang === "pt-BR" && /google|natural|premium|enhanced/i.test(v.name))
         || voices.find(v => v.lang === "pt-BR")
         || voices.find(isPt)
         || null;
}
if (typeof window !== "undefined" && window.speechSynthesis) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, btn) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  document.querySelectorAll(".speak-btn.playing").forEach(b => b.classList.remove("playing"));

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "pt-BR";
  utterance.rate = 0.9;
  if (ptVoice) utterance.voice = ptVoice;

  if (btn) {
    btn.classList.add("playing");
    utterance.onend = () => btn.classList.remove("playing");
    utterance.onerror = () => btn.classList.remove("playing");
  }

  speechSynthesis.speak(utterance);
}

function buildRow(num, pt, en, note, color) {
  const row = document.createElement("div");
  row.className = "verb-row";
  if (color) row.style.setProperty("--row-color", color);

  const numEl = document.createElement("span");
  numEl.className = "verb-num";
  numEl.textContent = num + ".";

  const speakBtn = document.createElement("button");
  speakBtn.className = "speak-btn";
  speakBtn.type = "button";
  speakBtn.setAttribute("aria-label", `Ouvir pronúncia de ${pt}`);
  speakBtn.title = `Ouvir "${pt}"`;
  speakBtn.innerHTML = SPEAKER_SVG;
  speakBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    speak(pt, speakBtn);
  });

  const ptEl = document.createElement("span");
  ptEl.className = "verb-pt";
  ptEl.dataset.lang = "pt";
  ptEl.innerHTML = pt + (note ? ` <span class="note">(${note})</span>` : "");
  ptEl.addEventListener("click", () => ptEl.classList.toggle("hidden"));

  const enEl = document.createElement("span");
  enEl.className = "verb-en";
  enEl.dataset.lang = "en";
  enEl.textContent = en;
  enEl.addEventListener("click", () => enEl.classList.toggle("hidden"));

  row.appendChild(numEl);
  row.appendChild(speakBtn);
  row.appendChild(ptEl);
  row.appendChild(enEl);
  return row;
}

function render() {
  const root = document.getElementById("content");
  root.innerHTML = "";
  root.classList.remove("shuffled");

  DATA.forEach(cat => {
    const section = document.createElement("div");
    section.className = "category";

    const hdr = document.createElement("div");
    hdr.className = "category-header";
    hdr.innerHTML = `<span class="category-dot" style="background:${cat.color}"></span><h2>${cat.category}</h2>`;
    section.appendChild(hdr);

    const list = document.createElement("div");
    list.className = "verb-list";

    cat.verbs.forEach(v => {
      const [num, pt, en, note] = v;
      list.appendChild(buildRow(num, pt, en, note, cat.color));
    });

    section.appendChild(list);
    root.appendChild(section);
  });

  updateOrderButtons(false);
}

function renderShuffled() {
  const all = [];
  DATA.forEach(cat => {
    cat.verbs.forEach(v => {
      const [num, pt, en, note] = v;
      all.push({ num, pt, en, note, color: cat.color });
    });
  });

  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }

  const root = document.getElementById("content");
  root.innerHTML = "";
  root.classList.add("shuffled");

  const list = document.createElement("div");
  list.className = "verb-list";
  all.forEach(v => {
    list.appendChild(buildRow(v.num, v.pt, v.en, v.note, v.color));
  });
  root.appendChild(list);

  updateOrderButtons(true);
}

function shuffleVerbs() {
  renderShuffled();
}

function resetOrder() {
  render();
}

function updateOrderButtons(isShuffled) {
  document.getElementById("btn-shuffle").classList.toggle("active", isShuffled);
  document.getElementById("btn-reset").classList.toggle("active", !isShuffled);
}

function hideAll(lang) {
  document.querySelectorAll(`[data-lang="${lang}"]`).forEach(el => el.classList.add("hidden"));
  updateButtons(lang);
}

function showAll() {
  document.querySelectorAll(".hidden").forEach(el => el.classList.remove("hidden"));
  updateButtons(null);
}

function updateButtons(hiddenLang) {
  document.getElementById("btn-hide-pt").classList.toggle("active", hiddenLang === "pt");
  document.getElementById("btn-hide-en").classList.toggle("active", hiddenLang === "en");
  document.getElementById("btn-show").classList.toggle("active", hiddenLang === null);
}

render();
</script>
</body>
</html>
