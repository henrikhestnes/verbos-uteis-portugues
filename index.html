<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 Verbos Úteis — Português / English</title>
<style>
  :root {
    --bg: #fafaf9;
    --card: #ffffff;
    --border: #e7e5e4;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --text: #1c1917;
    --muted: #78716c;
    --hidden-bg: #f5f0eb;
    --hidden-border: #d6cfc7;
    --cat-daily: #3b82f6;
    --cat-comm: #8b5cf6;
    --cat-consume: #10b981;
    --cat-routine: #f59e0b;
    --cat-social: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 1rem;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 2rem 0 1.5rem;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .controls button {
    padding: 0.5rem 1.1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .controls button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .controls button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .category {
    margin-bottom: 1.75rem;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    padding: 0 0.25rem;
  }

  .category-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .category-header h2 {
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .verb-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .verb-row {
    display: grid;
    grid-template-columns: 2.2rem 1fr 1fr;
    align-items: center;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    transition: box-shadow 0.15s ease;
  }

  .verb-row:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .verb-num {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-align: right;
  }

  .verb-pt, .verb-en {
    font-size: 1rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    padding: 0.3rem 0.4rem;
    border-radius: 4px;
    transition: background 0.15s ease;
    touch-action: manipulation;
  }

  .verb-pt { font-weight: 600; }
  .verb-en { color: #555; }

  .verb-pt .note, .verb-en .note {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 400;
  }

  .verb-pt.hidden, .verb-en.hidden {
    background: var(--hidden-bg);
    border: 1px dashed var(--hidden-border);
    color: transparent;
    min-height: 1.6rem;
  }

  .verb-pt.hidden *, .verb-en.hidden * {
    color: transparent;
  }

  .verb-pt.hidden::after, .verb-en.hidden::after {
    content: 'tap to reveal';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
    font-weight: 400;
  }

  footer {
    text-align: center;
    padding: 2rem 0 1rem;
    color: var(--muted);
    font-size: 0.8rem;
  }

  @media (max-width: 500px) {
    .verb-row {
      grid-template-columns: 2rem 1fr;
      padding: 0.6rem;
      gap: 0.2rem 0.4rem;
    }
    .verb-en {
      grid-column: 2;
      font-size: 0.85rem;
      padding-top: 0;
    }
    .verb-pt, .verb-en { font-size: 0.9rem; }
    .controls button { font-size: 0.85rem; padding: 0.5rem 0.9rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>50 Verbos Úteis</h1>
    <p>Portuguese &harr; English &mdash; click any word to hide/reveal</p>
  </header>

  <div class="controls">
    <button onclick="hideAll('pt')" id="btn-hide-pt">Hide all Português</button>
    <button onclick="hideAll('en')" id="btn-hide-en">Hide all English</button>
    <button onclick="showAll()" id="btn-show">Show all</button>
  </div>

  <div id="content"></div>

  <footer>50 verbos mais úteis &mdash; study tool</footer>
</div>

<script>
const DATA = [
  {
    category: "Vida diária e mobilidade",
    color: "#3b82f6",
    verbs: [
      [1, "morar", "to live"],
      [2, "trabalhar", "to work"],
      [3, "estudar", "to study"],
      [4, "chegar", "to arrive"],
      [5, "sair", "to go out", "irregular"],
      [6, "entrar", "to enter, to get in, to come in"],
      [7, "pegar", "to take (bus, metro, Uber)"],
      [8, "levar", "to take / carry"],
      [9, "voltar", "to return"],
      [10, "caminhar", "to walk"]
    ]
  },
  {
    category: "Comunicação",
    color: "#8b5cf6",
    verbs: [
      [11, "falar", "to speak, to talk"],
      [12, "perguntar", "to ask"],
      [13, "responder", "to answer"],
      [14, "explicar", "to explain"],
      [15, "chamar", "to call"],
      [16, "conversar", "to chat"],
      [17, "contar", "to tell"],
      [18, "repetir", "to repeat", "irregular"],
      [19, "entender", "to understand"],
      [20, "aprender", "to learn"]
    ]
  },
  {
    category: "Consumo e serviços",
    color: "#10b981",
    verbs: [
      [21, "comprar", "to buy"],
      [22, "pagar", "to pay"],
      [23, "usar", "to use"],
      [24, "pedir", "to order / request", "irregular"],
      [25, "abrir", "to open"],
      [26, "fechar", "to close"],
      [27, "vender", "to sell"],
      [28, "trocar", "to exchange"],
      [29, "escolher", "to choose"],
      [30, "procurar", "to look for"]
    ]
  },
  {
    category: "Rotina e lazer",
    color: "#f59e0b",
    verbs: [
      [31, "comer", "to eat"],
      [32, "beber", "to drink"],
      [33, "cozinhar", "to cook"],
      [34, "assistir", "to watch"],
      [35, "escutar", "to listen"],
      [36, "dançar", "to dance"],
      [37, "viajar", "to travel"],
      [38, "descansar", "to rest"],
      [39, "praticar", "to practice"],
      [40, "treinar", "to train"]
    ]
  },
  {
    category: "Interação social",
    color: "#ef4444",
    verbs: [
      [41, "gostar", "to like"],
      [42, "amar", "to love"],
      [43, "ajudar", "to help"],
      [44, "convidar", "to invite"],
      [45, "aceitar", "to accept"],
      [46, "recusar", "to refuse"],
      [47, "combinar", "to arrange"],
      [48, "encontrar", "to meet"],
      [49, "esperar", "to wait"],
      [50, "seguir", "to follow", "irregular"]
    ]
  }
];

function render() {
  const root = document.getElementById("content");
  root.innerHTML = "";

  DATA.forEach(cat => {
    const section = document.createElement("div");
    section.className = "category";

    const hdr = document.createElement("div");
    hdr.className = "category-header";
    hdr.innerHTML = `<span class="category-dot" style="background:${cat.color}"></span><h2>${cat.category}</h2>`;
    section.appendChild(hdr);

    const list = document.createElement("div");
    list.className = "verb-list";

    cat.verbs.forEach(v => {
      const [num, pt, en, note] = v;
      const row = document.createElement("div");
      row.className = "verb-row";

      const numEl = document.createElement("span");
      numEl.className = "verb-num";
      numEl.textContent = num + ".";

      const ptEl = document.createElement("span");
      ptEl.className = "verb-pt";
      ptEl.dataset.lang = "pt";
      ptEl.innerHTML = pt + (note ? ` <span class="note">(${note})</span>` : "");
      ptEl.addEventListener("click", () => ptEl.classList.toggle("hidden"));

      const enEl = document.createElement("span");
      enEl.className = "verb-en";
      enEl.dataset.lang = "en";
      enEl.textContent = en;
      enEl.addEventListener("click", () => enEl.classList.toggle("hidden"));

      row.appendChild(numEl);
      row.appendChild(ptEl);
      row.appendChild(enEl);
      list.appendChild(row);
    });

    section.appendChild(list);
    root.appendChild(section);
  });
}

function hideAll(lang) {
  document.querySelectorAll(`[data-lang="${lang}"]`).forEach(el => el.classList.add("hidden"));
  updateButtons(lang);
}

function showAll() {
  document.querySelectorAll(".hidden").forEach(el => el.classList.remove("hidden"));
  updateButtons(null);
}

function updateButtons(hiddenLang) {
  document.getElementById("btn-hide-pt").classList.toggle("active", hiddenLang === "pt");
  document.getElementById("btn-hide-en").classList.toggle("active", hiddenLang === "en");
  document.getElementById("btn-show").classList.toggle("active", hiddenLang === null);
}

render();
</script>
</body>
</html>
